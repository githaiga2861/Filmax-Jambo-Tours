<style>
:root {
  --black: #080808; --deep: #0d0d0d; --charcoal: #141414; --card: #111111;
  --gold: #d4af37; --gold-light: #e8c84a; --gold-dim: rgba(212,175,55,0.15);

}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--gold); }

/* CURSOR */
.cursor { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); mix-blend-mode: difference; }
.cursor-ring { width: 40px; height: 40px; border: 1px solid rgba(212,175,55,0.5); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999998; transform: translate(-50%, -50%); transition: transform 0.15s ease-out; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 48px; background: rgba(8,8,8,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
.nav-logo-img { height: 52px; width: auto; object-fit: contain; filter: drop-shadow(0 0 10px rgba(212,175,55,0.4)); }
.nav-back { font-family: 'Jost', sans-serif; font-size: 10px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 12px; transition: color 0.3s; cursor: none; }
.nav-back::before { content: ''; width: 28px; height: 1px; background: var(--muted); transition: width 0.3s, background 0.3s; }
.nav-back:hover { color: var(--gold); }
.nav-back:hover::before { width: 40px; background: var(--gold); }

/* HERO */
.journal-hero { padding: 160px 0 80px; background: var(--charcoal); border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
.journal-hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.06) 0%, transparent 70%); pointer-events: none; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 48px; }
.section-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 20px; }
.section-title { font-family: 'Playfair Display', serif; font-size: clamp(36px, 5vw, 64px); font-weight: 700; line-height: 1.1; margin-bottom: 20px; }
.gold-line { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
.gold-line::before, .gold-line::after { content: ''; height: 1px; flex: 1; background: var(--border); }
.gold-line span { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }

/* FILTER BAR */
.blog-filter-bar { display: flex; align-items: center; gap: 0; margin: 52px auto 0; position: relative; width: fit-content; flex-wrap: nowrap; }
.blog-filter-bar::before { content: ''; position: absolute; inset: 0; border: 1px solid rgba(212,175,55,0.15); pointer-events: none; }
.blog-filter-btn { font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 400; letter-spacing: 5px; text-transform: uppercase; padding: 16px 32px; background: transparent; color: var(--muted); border: none; border-right: 1px solid rgba(212,175,55,0.12); cursor: none; transition: color 0.4s ease, background 0.4s ease; }
.blog-filter-btn:last-child { border-right: none; }
.blog-filter-btn:hover { color: var(--text); background: rgba(212,175,55,0.04); }
.blog-filter-btn.active { color: var(--gold); background: rgba(212,175,55,0.07); }

/* BLOG GRID */
.blog-listing { padding: 80px 0 120px; }
.blog-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 48px; }
.blog-post-card { background: var(--card); border: 1px solid rgba(255,255,255,0.04); position: relative; overflow: hidden; cursor: none; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color 0.4s, transform 0.4s, box-shadow 0.4s; }
.blog-post-card:hover { border-color: var(--border); transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
.blog-post-card-img-wrap { position: relative; overflow: hidden; height: 220px; flex-shrink: 0; }
.blog-post-card-img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.04); transition: transform 0.8s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.8s ease; filter: brightness(0.82) saturate(0.85); display: block; }
.blog-post-card:hover .blog-post-card-img { transform: scale(1.09); filter: brightness(0.72) saturate(0.75); }
.blog-post-card-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(8,8,8,0.7) 100%); z-index: 1; }
.blog-post-card-category { position: absolute; top: 20px; left: 20px; z-index: 2; font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: var(--black); background: var(--gold); padding: 4px 12px; }
.blog-post-card-body { padding: 28px 32px 36px; display: flex; flex-direction: column; flex: 1; }
.blog-post-card-meta { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.blog-post-card-date { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.blog-post-card-read { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(212,175,55,0.5); display: flex; align-items: center; gap: 6px; }
.blog-post-card-read::before { content: ''; width: 1px; height: 10px; background: var(--border); }
.blog-post-card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.25; color: var(--text); margin-bottom: 12px; transition: color 0.3s; flex: 1; }
.blog-post-card:hover .blog-post-card-title { color: var(--gold); }
.blog-post-card-excerpt { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
.blog-post-card-cta { display: flex; align-items: center; gap: 10px; font-family: 'Jost', sans-serif; font-size: 9px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-top: auto; transition: gap 0.3s; }
.blog-post-card-cta::after { content: ''; width: 24px; height: 1px; background: var(--gold); transition: width 0.4s; }
.blog-post-card:hover .blog-post-card-cta { gap: 14px; }
.blog-post-card:hover .blog-post-card-cta::after { width: 40px; }

/* EMPTY STATE */
.blog-empty { text-align: center; padding: 80px 0; opacity: 0.5; }
.blog-empty p { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; color: var(--muted); }

/* REVEAL */
.reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s cubic-bezier(0.22,1,0.36,1), transform 0.8s cubic-bezier(0.22,1,0.36,1); }
.reveal.visible { opacity: 1; transform: translateY(0); }

/* FOOTER */

/* WHATSAPP */
.whatsapp-fab { position: fixed; bottom: 36px; right: 36px; width: 60px; height: 60px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 90; text-decoration: none; box-shadow: 0 8px 30px rgba(37,211,102,0.4); cursor: none; transition: transform 0.3s, box-shadow 0.3s; }

.whatsapp-fab svg { width: 28px; height: 28px; fill: white; }

function switchBlogTab(tab) {
  const si = document.getElementById('blogPanelSI');
  const su = document.getElementById('blogPanelSU');
  const tSI = document.getElementById('blogTabSI');
  const tSU = document.getElementById('blogTabSU');
  const title = document.getElementById('blogModalTitle');
  if (!si || !su) return;
  const gold = '#d4af37', dim = 'rgba(138,128,116,0.8)';
  if (tab === 'signin') {
    si.style.display = 'block'; su.style.display = 'none';
    if (tSI) { tSI.style.color = gold; tSI.style.borderBottomColor = gold; }
    if (tSU) { tSU.style.color = dim;  tSU.style.borderBottomColor = 'transparent'; }
    if (title) title.innerHTML = 'Welcome<br><em style="color:#d4af37;font-weight:400;">Back</em>';
  } else {
    si.style.display = 'none'; su.style.display = 'block';
    if (tSU) { tSU.style.color = gold; tSU.style.borderBottomColor = gold; }
    if (tSI) { tSI.style.color = dim;  tSI.style.borderBottomColor = 'transparent'; }
    if (title) title.innerHTML = 'Join the<br><em style="color:#d4af37;font-weight:400;">Journey</em>';
  }
  document.getElementById('blogAuthErr').style.display = 'none';
  document.getElementById('blogAuthOk').style.display = 'none';
}

async function blogSignIn() {
  const email = document.getElementById('blogSIEmail')?.value.trim();
  const pass  = document.getElementById('blogSIPass')?.value;
  const err   = document.getElementById('blogAuthErr');
  const ok    = document.getElementById('blogAuthOk');
  const btn   = document.getElementById('blogSIBtn');
  if (!email || !pass) { if(err){err.textContent='Please enter your email and password.';err.style.display='block';} return; }
  if(btn) btn.textContent = 'Signing in…';
  try {
    const { data, error } = await supa.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    if (ok) { ok.textContent = 'Signed in! Loading stories…'; ok.style.display = 'block'; }
    if (err) err.style.display = 'none';
    setTimeout(() => { document.getElementById('blogAuthModal')?.remove(); document.getElementById('blogAuthGate')?.remove(); loadBlogs(); const masonry = document.getElementById('blogMasonry'); if(masonry){masonry.style.filter='';masonry.style.pointerEvents='';} }, 1000);
  } catch(e) {
    if (err) { err.textContent = e.message || 'Sign in failed.'; err.style.display = 'block'; }
    if (ok) ok.style.display = 'none';
  }
  if(btn) btn.textContent = 'Sign In to Read';
}

async function blogSignUp() {
  const firstName = document.getElementById('blogSUFirst')?.value.trim();
  const lastName  = document.getElementById('blogSULast')?.value.trim();
  const email     = document.getElementById('blogSUEmail')?.value.trim();
  const pass      = document.getElementById('blogSUPass')?.value;
  const conf      = document.getElementById('blogSUConf')?.value;
  const err       = document.getElementById('blogAuthErr');
  const ok        = document.getElementById('blogAuthOk');
  const btn       = document.getElementById('blogSUBtn');
  if (!firstName || !lastName) { if(err){err.textContent='Please enter your first and last name.';err.style.display='block';} return; }
  if (!email) { if(err){err.textContent='Please enter your email.';err.style.display='block';} return; }
  if (!pass || pass.length < 8) { if(err){err.textContent='Password must be at least 8 characters.';err.style.display='block';} return; }
  if (pass !== conf) { if(err){err.textContent='Passwords do not match.';err.style.display='block';} return; }
  if(btn) btn.textContent = 'Creating account…';
  try {
    const { data, error } = await supa.auth.signUp({
      email, password: pass,
      options: { data: { first_name: firstName, last_name: lastName } }
    });
    if (error) throw error;
    if (data?.user?.identities?.length === 0) {
      if (err) { err.textContent = 'Account already exists. Please sign in.'; err.style.display = 'block'; }
    } else {
      if (ok) { ok.textContent = 'Account created! Check your email to confirm, then sign in.'; ok.style.display = 'block'; }
      if (err) err.style.display = 'none';
    }
  } catch(e) {
    if (err) { err.textContent = e.message || 'Registration failed.'; err.style.display = 'block'; }
  }
  if(btn) btn.textContent = 'Create Free Account';
}

let allBlogs = [...fallbackBlogs];
let activeFilter = 'all';

async function loadBlogs() {
  try {
    const { data, error } = await supa
      .from('blogs')
      .select('slug,title,excerpt,category,published_date,read_time,cover_image_url,cover_alt,is_published')
      .eq('is_published', true)
      .order('published_date', { ascending: false });

    if (!error && data?.length) {
      const supaBlogs = data.map(b => ({
        slug: b.slug, title: b.title, excerpt: b.excerpt||'',
        category: b.category||'Safari',
        date: b.published_date ? new Date(b.published_date).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : '',
        read_time: b.read_time||'5 min read',
        cover_image: b.cover_image_url||'assets/maasaimara.webp',
        cover_alt: b.cover_alt||b.title,
      }));
      const slugSet = new Set(supaBlogs.map(b=>b.slug));
      allBlogs = [...supaBlogs, ...fallbackBlogs.filter(b=>!slugSet.has(b.slug))];
    }
  } catch(e) {}
  renderGrid();
}

function buildCard(blog) {
  const page = blog.slug.startsWith('http') ? blog.slug : `blog/${blog.slug}.html`;
  return `<a href="${page}" class="blog-post-card reveal">
    <div class="blog-post-card-img-wrap">
      <img class="blog-post-card-img" src="${blog.cover_image}" alt="${blog.cover_alt||blog.title}" loading="lazy">
      <div class="blog-post-card-overlay"></div>
      <span class="blog-post-card-category">${blog.category}</span>
    </div>
    <div class="blog-post-card-body">
      <div class="blog-post-card-meta">
        <span class="blog-post-card-date">${blog.date}</span>
        <span class="blog-post-card-read">${blog.read_time}</span>
      </div>
      <h2 class="blog-post-card-title">${blog.title}</h2>
      <p class="blog-post-card-excerpt">${blog.excerpt}</p>
      <span class="blog-post-card-cta">Read the story</span>
    </div>
  </a>`;
}

function renderGrid() {
  const grid = document.getElementById('blogMasonry');
  const filtered = activeFilter === 'all' ? allBlogs : allBlogs.filter(b => b.category === activeFilter);
  if (!filtered.length) {
    grid.innerHTML = '<div class="blog-empty"><p>No stories in this category yet. Check back soon.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(buildCard).join('');
  // Re-run reveal observer
  grid.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  // Cursor effects
  grid.querySelectorAll('.blog-post-card').forEach(el => {
    el.addEventListener('mouseenter', () => { cursor.style.width='20px'; cursor.style.height='20px'; ring.style.width='60px'; ring.style.height='60px'; });
    el.addEventListener('mouseleave', () => { cursor.style.width='12px'; cursor.style.height='12px'; ring.style.width='40px'; ring.style.height='40px'; });
  });
}

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

document.querySelectorAll('.blog-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!_blogCurrentUser) { openBlogAuth('signin'); return; }
    document.querySelectorAll('.blog-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

// Only load blogs if already authenticated (checkBlogAuth runs first)
if (_blogCurrentUser) loadBlogs();
</script>
<script>
(function(){
  var toggle = document.getElementById('themeToggle');
  var tooltip = document.getElementById('themeTooltip');
  if (!toggle) return;
  var saved = localStorage.getItem('fjt-theme');
  if (saved === 'light') { document.body.classList.add('light-mode'); if(tooltip) tooltip.textContent = 'Dark Mode'; }
  else { if(tooltip) tooltip.textContent = 'Light Mode'; }
  toggle.addEventListener('click', function(){
    var isLight = document.body.classList.toggle('light-mode');
    localStorage.setItem('fjt-theme', isLight ? 'light' : 'dark');
    if(tooltip) tooltip.textContent = isLight ? 'Dark Mode' : 'Light Mode';
  });
})();

(function(){
  var container = document.getElementById('hintsContainer');
  var shown = new Set();
  var DURATION = 5000;

  var hints = [
    {
      id: 'filter-hint',
      label: 'Tip',
      text: 'Filter stories by category — Wildlife, Planning, Coast and more.',
      targetId: 'blogMasonry',
      pointer: 'up',
      offsetX: 0, offsetY: -56,
      triggerElId: 'blogMasonry',
      triggerOffset: window.innerHeight * 0.8
    },
    {
      id: 'whatsapp-hint',
      label: 'Quick action',
      text: 'Tap the WhatsApp button to reach us and plan your safari now.',
      fixedPos: { bottom: 104, right: 100 },
      pointer: 'right',
      triggerScrollY: 600
    }
  ];

  function showHint(hint) {
    if (shown.has(hint.id)) return;
    shown.add(hint.id);
    var box = document.createElement('div');
    box.className = 'site-hint';
    box.innerHTML =
      '<span class="site-hint-label">' + hint.label + '</span>' +
      '<span class="site-hint-text">' + hint.text + '</span>' +
      '<button class="site-hint-close" aria-label="Dismiss">×</button>' +
      '<div class="site-hint-pointer ' + (hint.pointer||'down') + '"></div>' +
      '<div class="site-hint-bar"></div>';

    function positionBox() {
      if (hint.fixedPos) {
        box.style.position = 'fixed';
        if (hint.fixedPos.bottom !== undefined) box.style.bottom = hint.fixedPos.bottom + 'px';
        if (hint.fixedPos.right  !== undefined) box.style.right  = hint.fixedPos.right  + 'px';
        return;
      }
      var el = hint.targetId ? document.getElementById(hint.targetId) : null;
      if (!el) return;
      var rect = el.getBoundingClientRect();
      box.style.position = 'absolute';
      box.style.top  = (rect.top + window.pageYOffset + (hint.offsetY||0)) + 'px';
      box.style.left = Math.max(8, rect.left + window.pageXOffset + (hint.offsetX||0)) + 'px';
    }

    positionBox();
    container.appendChild(box);
    window.addEventListener('scroll', positionBox, { passive: true });

    function dismiss() {
      box.classList.add('hiding');
      window.removeEventListener('scroll', positionBox);
      setTimeout(function(){ if (box.parentNode) box.parentNode.removeChild(box); }, 380);
    }

    var autoTimer = setTimeout(dismiss, DURATION);
    box.querySelector('.site-hint-close').addEventListener('click', function(){ clearTimeout(autoTimer); dismiss(); });
  }

  function checkHints() {
    var scrollY = window.pageYOffset;
    hints.forEach(function(hint){
      if (shown.has(hint.id)) return;
      if (hint.triggerScrollY && scrollY >= hint.triggerScrollY) { showHint(hint); return; }
      if (hint.triggerElId) {
        var el = document.getElementById(hint.triggerElId);
        if (!el) return;
        var rect = el.getBoundingClientRect();
        if (rect.top <= (hint.triggerOffset || window.innerHeight * 0.75)) showHint(hint);
      }
    });
  }

  window.addEventListener('scroll', checkHints, { passive: true });
  setTimeout(checkHints, 1500);
})();
</script>
